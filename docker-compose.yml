version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: promptlab-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload